apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-image-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-image-app
  template:
    metadata:
      labels:
        app: bad-image-app
    spec:
      containers:
        - name: bad-image-container
          image: nginx:wrongtag